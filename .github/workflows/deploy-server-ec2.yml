name: Deploy Backend

on:
  push:
    branches: [main]
    paths:
      - "server/**"

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build & Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: ./server
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/dev-tales:latest
          cache-from: type=registry,ref=${{ secrets.DOCKER_USERNAME }}/dev-tales:cache
          cache-to: type=registry,ref=${{ secrets.DOCKER_USERNAME }}/dev-tales:cache,mode=max

      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            docker pull ${{ secrets.DOCKER_USERNAME }}/dev-tales:latest

            docker stop backend || true
            docker rm backend || true

            docker run -d \
              --name backend \
              -p 5000:5000 \
              --restart=always \
              --env-file /home/ubuntu/.env \
              ${{ secrets.DOCKER_USERNAME }}/dev-tales:latest

            docker image prune -f
